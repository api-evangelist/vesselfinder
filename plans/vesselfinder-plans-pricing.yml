        price: '500.00'
        currency: USD
        userMultiplied: false
creditCosts:
  - method: Vessels (AIS dataset)
    credits: '1 (terrestrial) / 10 (satellite)'
  - method: Vessels (Voyage extradata)
    credits: '1'
  - method: Vessels (Master extradata)
    credits: '2'
  - method: PortCalls
    credits: '1–2'
  - method: ExpectedArrivals (AIS)
    credits: '5'
  - method: ExpectedArrivals (Voyage)
    credits: '1'
  - method: ExpectedArrivals (Master)
    credits: '2'
  - method: MasterData
    credits: '3'
  - method: Distance
    credits: '1 per delivered response'
  - method: Status
    credits: '0'
  - method: ListManager
    credits: '0'
containerTracking:
  cachePolicy: First search per container deducts one unit; subsequent searches within 30 days are free. Successful responses are cached 12 hours.
