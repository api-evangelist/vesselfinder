capabilityDimensions:
  - dataset: AIS — dynamic position and state
  - dataset: Voyage — last port-call summary
  - dataset: Master — static vessel particulars
  - dataset: PortCall — arrival/departure events
  - dataset: Distance — sea-route geometry between two coordinates
  - dataset: Container — shipment schedule and current vessel
billing:
